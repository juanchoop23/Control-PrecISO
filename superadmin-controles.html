<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Controles - Superadmin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #ffffff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            border-left: 5px solid #485755;
            padding-left: 20px;
        }
        .control-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .control-id {
            font-weight: 700;
            color: #485755;
        }
        .control-titulo {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }
        .control-descripcion {
            width: 100%;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            resize: vertical;
        }
        .btn {
            padding: 6px 12px;
            background: #485755;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestión de Controles ISO 27001</h1>
        <div id="loading" class="loading">Cargando controles...</div>
        <div id="controlesContainer"></div>
    </div>

    <script>

        // endpoints
        const API_CONTROLES = 'https://lycd7kx0r2.execute-api.us-east-1.amazonaws.com/v1/controles';
        
        async function cargarControles() {
            try {
                const response = await fetch(API_CONTROLES);
                const data = await response.json();
                const controles = data.controles || [];

                const container = document.getElementById('controlesContainer');
                container.innerHTML = '';
                document.getElementById('loading').style.display = 'none';

                controles.forEach(control => {
                    const card = document.createElement('div');
                    card.className = 'control-card';
                    card.innerHTML = `
                        <div class="control-header">
                            <span class="control-id">${control.id}</span>
                            <button class="btn" onclick="guardarControl('${control.id}')">💾 Guardar</button>
                        </div>
                        <input type="text" id="titulo-${control.id}" class="control-titulo" value="${control.titulo || ''}">
                        <textarea id="desc-${control.id}" class="control-descripcion" rows="3">${control.descripcion || ''}</textarea>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').innerHTML = `<div style="color:#dc2626;">Error: ${error.message}</div>`;
            }
        }

        

        const API_BASE = 'https://lycd7kx0r2.execute-api.us-east-1.amazonaws.com/v1';

        async function guardarControl(controlId) {
            const titulo = document.getElementById(`titulo-${controlId}`).value;
            const descripcion = document.getElementById(`desc-${controlId}`).value;
            
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '💾 Guardando...';
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/controles/${controlId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ titulo, descripcion })
                });
                
                if (!response.ok) throw new Error('Error al guardar');
                
                btn.textContent = '✅ Guardado!';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                btn.textContent = '❌ Error';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);
            }
        }

        cargarControles();
    </script>
</body>
</html>
