<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <title>Auditoría ISO 27001 - Control PrecISO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 600;
            border-left: 5px solid #485755;
            padding-left: 20px;
        }

        .subtitulo {
            color: #64748b;
            margin-bottom: 30px;
            padding-left: 25px;
            font-size: 15px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #485755;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stats span {
            font-weight: 600;
            color: #485755;
        }

        .controles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .control-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #485755;
        }

        .control-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .control-icon {
            width: 40px;
            height: 40px;
            background: #485755;
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-weight: bold;
            font-size: 14px;
        }

        .control-title {
            font-size: 18px;
            font-weight: 600;
            color: #485755;
        }

        .control-desc {
            color: #475569;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 15px;
            padding: 0 5px;
            flex-grow: 1;
        }

        .estados-container {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            background: white;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .estado-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f1f5f9;
        }

        .estado-item.selected {
            background: #485755;
        }

        .estado-item.selected .estado-label {
            color: white;
        }

        .estado-label {
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .estado-label.cumple { color: #10b981; }
        .estado-label.nocumple { color: #ef4444; }

        .estado-item.selected .estado-label.cumple,
        .estado-item.selected .estado-label.nocumple {
            color: white;
        }

        .observacion-input {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 12px;
            resize: vertical;
        }

        .acciones-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: #485755;
            color: white;
            box-shadow: 0 4px 10px rgba(72, 87, 85, 0.3);
        }

        .btn:hover {
            background: #1a2560;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .save-status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #10b981;
        }

        @media (max-width: 768px) {
            .controles-grid {
                grid-template-columns: 1fr;
            }
            .estados-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Auditoría ISO 27001:2022</h1>
        <div class="subtitulo">
            Evaluación de cumplimiento de controles - Marque CÚMPLE o NO CUMPLE para cada control
        </div>

        <div id="loading" class="loading">Cargando controles...</div>
        <div id="error" class="error-message" style="display: none;"></div>
        
        <div id="stats" class="stats" style="display: none;">
            <span>📊 Controles a evaluar: <span id="totalControles">0</span></span>
            <span>✅ Cumplen: <span id="cumplenCount">0</span></span>
            <span>❌ No cumplen: <span id="nocumplenCount">0</span></span>
        </div>
        
        <div id="controlesContainer" style="display: none;"></div>

        <div class="acciones-container">
            <button id="guardarBtn" class="btn">Guardar Cambios 💾</button>
        </div>
        <div id="saveStatus" class="save-status"></div>
    </div>

    <script>
        // Asignación de roles
        const userRole = getUserRole();
        if (userRole !== 'AdminEmpresa' && userRole !== 'Superadmin') {
            document.body.innerHTML = '<div style="text-align:center; padding:50px;"><h2>⚠️ Acceso denegado</h2><p>No tienes permisos para acceder a esta página.</p><a href="dashboard.html">Volver al Dashboard</a></div>';
            throw new Error('Acceso denegado');
        }
        // CONFIGURACIÓN 
        const API_EMPRESA_CONTROLES = 'https://jsaxgpptq9.execute-api.us-east-1.amazonaws.com/v1/empresa-controles';
        const API_ESTADOS = 'https://ccgu3zrns1.execute-api.us-east-1.amazonaws.com/v1/estados';
        const EMPRESA_ID = localStorage.getItem('empresa_id') || 8;

        // Estado
        let controles = [];
        let estadosMap = {};
        let cambiosPendientes = new Map();

        // Elementos DOM
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const statsDiv = document.getElementById('stats');
        const containerDiv = document.getElementById('controlesContainer');
        const guardarBtn = document.getElementById('guardarBtn');
        const saveStatusDiv = document.getElementById('saveStatus');
        const totalControlesSpan = document.getElementById('totalControles');
        const cumplenCountSpan = document.getElementById('cumplenCount');
        const nocumplenCountSpan = document.getElementById('nocumplenCount');

        // Función para actualizar estadísticas
        function actualizarStats() {
            const cumplen = controles.filter(c => {
                const estado = cambiosPendientes.has(c.id) ? cambiosPendientes.get(c.id).estado : estadosMap[c.id];
                return estado === 'cumple';
            }).length;
            const nocumplen = controles.filter(c => {
                const estado = cambiosPendientes.has(c.id) ? cambiosPendientes.get(c.id).estado : estadosMap[c.id];
                return estado === 'no_cumple';
            }).length;
            cumplenCountSpan.textContent = cumplen;
            nocumplenCountSpan.textContent = nocumplen;
        }

        // Renderizar controles
        function renderizarControles() {
            console.log('=== RENDERIZANDO CONTROLES ===');
            console.log('controles.length:', controles.length);
            console.log('estadosMap:', estadosMap);
            console.log('cambiosPendientes:', cambiosPendientes);
            
            containerDiv.innerHTML = '';
            
            if (controles.length === 0) {
                containerDiv.innerHTML = '<div style="text-align: center; padding: 50px; color: #64748b;">No hay controles asignados para esta empresa</div>';
                return;
            }
            
            const grid = document.createElement('div');
            grid.className = 'controles-grid';
            
            controles.forEach(control => {
                const controlId = control.id;
                
                // Obtener estado guardado de estadosMap
                const estadoGuardado = estadosMap[controlId];
                console.log(`Control ${controlId}: estadoGuardado =`, estadoGuardado);
                
                // Obtener estado pendiente si existe
                const cambioPendiente = cambiosPendientes.get(controlId);
                
                // Determinar estado actual (prioridad: cambios pendientes > estados guardados)
                let estadoActual = 'no_aplica';
                if (cambioPendiente) {
                    estadoActual = cambioPendiente.estado;
                    console.log(`Control ${controlId}: usando cambio pendiente -> ${estadoActual}`);
                } else if (estadoGuardado && estadoGuardado.estado) {
                    estadoActual = estadoGuardado.estado;
                    console.log(`Control ${controlId}: usando estado guardado -> ${estadoActual}`);
                } else {
                    console.log(`Control ${controlId}: sin estado, usando default -> no_aplica`);
                }
                
                // Obtener observación
                let observacion = '';
                if (cambioPendiente && cambioPendiente.observacion !== undefined) {
                    observacion = cambioPendiente.observacion;
                } else if (estadoGuardado && estadoGuardado.observaciones) {
                    observacion = estadoGuardado.observaciones;
                }
                
                console.log(`Control ${controlId}: estadoActual final = ${estadoActual}, observacion = ${observacion}`);
                
                const card = document.createElement('div');
                card.className = 'control-card';
                card.dataset.id = controlId;
                
                card.innerHTML = `
                    <div class="control-header">
                        <div class="control-icon">${controlId.split('.')[1]}</div>
                        <div class="control-title">CONTROL ${controlId}</div>
                    </div>
                    <div class="control-desc">
                        <strong>${control.titulo}</strong><br>
                        <span style="color: #64748b; font-size: 12px;">${control.descripcion || 'Sin descripción'}</span>
                    </div>
                    <div class="estados-container">
                        <div class="estado-item ${estadoActual === 'cumple' ? 'selected' : ''}" data-estado="cumple">
                            <span class="estado-label cumple">✅ CÚMPLE</span>
                        </div>
                        <div class="estado-item ${estadoActual === 'no_cumple' ? 'selected' : ''}" data-estado="no_cumple">
                            <span class="estado-label nocumple">❌ NO CUMPLE</span>
                        </div>
                    </div>
                    <textarea class="observacion-input" placeholder="Observaciones (opcional)..." rows="2">${observacion}</textarea>
                `;
                
                // Eventos para seleccionar estado
                const estadoItems = card.querySelectorAll('.estado-item');
                estadoItems.forEach(item => {
                    item.addEventListener('click', () => {
                        const nuevoEstado = item.dataset.estado;
                        const observacionText = card.querySelector('.observacion-input').value;
                        
                        estadoItems.forEach(el => el.classList.remove('selected'));
                        item.classList.add('selected');
                        
                        cambiosPendientes.set(controlId, {
                            estado: nuevoEstado,
                            observacion: observacionText
                        });
                        
                        console.log(`Click: ${controlId} -> ${nuevoEstado}`);
                        actualizarStats();
                    });
                });
                
                // Evento para cambios en observación
                const obsInput = card.querySelector('.observacion-input');
                obsInput.addEventListener('change', () => {
                    const estadoActualSeleccionado = card.querySelector('.estado-item.selected');
                    const estado = estadoActualSeleccionado ? estadoActualSeleccionado.dataset.estado : (estadosMap[controlId]?.estado || 'no_aplica');
                    cambiosPendientes.set(controlId, {
                        estado: estado,
                        observacion: obsInput.value
                    });
                    console.log(`Observación cambiada para ${controlId}: ${obsInput.value}`);
                });
                
                grid.appendChild(card);
            });
            
            containerDiv.appendChild(grid);
            actualizarStats();
            console.log('=== RENDERIZADO COMPLETO ===');
        }

        // Cargar datos
        async function cargarDatos() {
            try {
                loadingDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                containerDiv.style.display = 'none';
                statsDiv.style.display = 'none';

                // 1. Obtener controles seleccionados para la empresa
                const responseControles = await fetch(`${API_EMPRESA_CONTROLES}?empresa_id=${EMPRESA_ID}`);
                if (!responseControles.ok) throw new Error('Error al cargar controles');
                const dataControles = await responseControles.json();
                const controlIds = dataControles.controles || [];
                
                if (controlIds.length === 0) {
                    throw new Error('No hay controles asignados para esta empresa');
                }
                
                // 2. Obtener estados de los controles
                const responseEstados = await fetch(`${API_ESTADOS}?empresa_id=${EMPRESA_ID}`);
                if (!responseEstados.ok) throw new Error('Error al cargar estados');
                const dataEstados = await responseEstados.json();
                const estados = dataEstados.estados || [];
                
                // Crear mapa de estados
                estadosMap = {};
                estados.forEach(e => {
                    estadosMap[e.control_id] = {
                        estado: e.estado_auditoria,
                        observaciones: e.observaciones
                    };
                });
                
                // 3. Para cada control, obtener detalles (título, descripción)
                // Necesitamos obtener los detalles de los controles desde controles-api
                const responseDetalles = await fetch('https://lycd7kx0r2.execute-api.us-east-1.amazonaws.com/v1/controles');
                if (!responseDetalles.ok) throw new Error('Error al cargar detalles de controles');
                const dataDetalles = await responseDetalles.json();
                const todosControles = dataDetalles.controles || [];
                
                // Filtrar solo los controles seleccionados
                controles = todosControles.filter(c => controlIds.includes(c.id));
                
                totalControlesSpan.textContent = controles.length;
                renderizarControles();
                
                loadingDiv.style.display = 'none';
                containerDiv.style.display = 'block';
                statsDiv.style.display = 'flex';

            } catch (err) {
                console.error('Error:', err);
                errorDiv.textContent = `Error: ${err.message}`;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        }

        // Guardar cambios
       async function guardarCambios() {
            if (cambiosPendientes.size === 0) {
                saveStatusDiv.textContent = 'No hay cambios pendientes';
                setTimeout(() => { saveStatusDiv.textContent = ''; }, 2000);
                return;
            }

            guardarBtn.disabled = true;
            saveStatusDiv.textContent = 'Guardando cambios...';
            
            let guardados = 0;
            let errores = 0;
            
            for (const [controlId, cambio] of cambiosPendientes) {
                try {
                    const response = await fetch(API_ESTADOS, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            empresa_id: EMPRESA_ID,
                            control_id: controlId,
                            modulo: 'auditoria',
                            estado: cambio.estado,
                            observaciones: cambio.observacion
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`Error en control ${controlId}`);
                    }
                    
                    guardados++;
                    // Actualizar estadosMap con el nuevo valor guardado
                    estadosMap[controlId] = {
                        estado: cambio.estado,
                        observaciones: cambio.observacion
                    };
                    
                    console.log(`✅ Guardado ${controlId} -> ${cambio.estado}`);
                    
                } catch (err) {
                    console.error(`Error guardando ${controlId}:`, err);
                    errores++;
                }
            }
            
            console.log('estadosMap después de guardar:', estadosMap);
            
            cambiosPendientes.clear();
            
            // 🔥 Recargar la vista para mostrar los cambios guardados
            renderizarControles();
            
            // 🔥 ACTUALIZAR ESTADÍSTICAS DESPUÉS DEL RENDERIZADO
            actualizarStats();
            
            if (errores === 0) {
                saveStatusDiv.textContent = `✅ ${guardados} cambios guardados correctamente`;
            } else {
                saveStatusDiv.textContent = `⚠️ ${guardados} guardados, ${errores} errores`;
            }
            
            setTimeout(() => { saveStatusDiv.textContent = ''; }, 3000);
            guardarBtn.disabled = false;
        }
        function actualizarStats() {
            // Contar usando estadosMap (valores guardados) porque cambiosPendientes ya se limpiaron
            const cumplen = controles.filter(c => {
                const estado = estadosMap[c.id]?.estado;
                return estado === 'cumple';
            }).length;
            
            const nocumplen = controles.filter(c => {
                const estado = estadosMap[c.id]?.estado;
                return estado === 'no_cumple';
            }).length;
            
            cumplenCountSpan.textContent = cumplen;
            nocumplenCountSpan.textContent = nocumplen;
            
            console.log(`Estadísticas: Cumplen=${cumplen}, No cumplen=${nocumplen}`);
        }

        guardarBtn.addEventListener('click', guardarCambios);
        cargarDatos();
    </script>
</body>
</html>
