<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <title>Gestión de Controles - ISO 27001:2022</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: clamp(24px, 5vw, 32px);
            font-weight: 600;
            border-left: 5px solid #485755;
            padding-left: 15px;
        }

        .subtitulo {
            color: #64748b;
            margin-bottom: 25px;
            padding-left: 20px;
            font-size: clamp(13px, 4vw, 15px);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #485755;
            font-size: 18px;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stats span {
            font-weight: 600;
            color: #485755;
        }

        .acordeon-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .categoria-acordeon {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .categoria-acordeon:hover {
            border-color: #485755;
        }

        details {
            width: 100%;
        }

        details summary {
            padding: 18px 20px;
            background: #f8fafc;
            cursor: pointer;
            font-weight: 600;
            font-size: clamp(16px, 4vw, 18px);
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
            list-style: none;
            transition: background 0.3s;
        }

        details summary:hover {
            background: #f1f5f9;
        }

        details summary::-webkit-details-marker {
            display: none;
        }

        .summary-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            flex-wrap: wrap;
            gap: 12px;
        }

        .summary-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .categoria-icono {
            width: 36px;
            height: 36px;
            background: #485755;
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .categoria-nombre {
            font-size: clamp(15px, 4vw, 18px);
            font-weight: 600;
        }

        .categoria-stats {
            display: flex;
            gap: 8px;
            font-size: 13px;
            color: #64748b;
            flex-wrap: wrap;
        }

        .categoria-stats span {
            background: white;
            padding: 4px 10px;
            border-radius: 50px;
            border: 1px solid #e2e8f0;
        }

        .summary-arrow {
            font-size: 18px;
            color: #485755;
            transition: transform 0.3s;
        }

        details[open] .summary-arrow {
            transform: rotate(180deg);
        }

        .controles-lista {
            padding: 0 20px 20px 20px;
            border-top: 2px solid #e2e8f0;
            background: white;
        }

        .control-item {
            padding: 15px 0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .control-item:last-child {
            border-bottom: none;
        }

        .control-checkbox {
            width: 20px;
            height: 20px;
            accent-color: #485755;
            cursor: pointer;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .control-contenido {
            flex: 1;
        }

        .control-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .control-codigo {
            font-size: 14px;
            font-weight: 700;
            color: #485755;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 50px;
            border: 1px solid #e2e8f0;
        }

        .control-nombre {
            font-size: clamp(14px, 4vw, 16px);
            font-weight: 600;
            color: #1e293b;
        }

        .control-descripcion {
            color: #475569;
            font-size: clamp(13px, 3.5vw, 14px);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .control-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            background: #f1f5f9;
            padding: 3px 8px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .acciones-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: #485755;
            color: white;
            box-shadow: 0 4px 10px rgba(72, 87, 85, 0.3);
        }

        .btn:hover {
            background: #1a2560;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .save-status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #10b981;
        }

        @media (max-width: 768px) {
            .controles-lista {
                padding: 0 15px 15px 15px;
            }
            .control-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            .acciones-container {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestión de Controles ISO 27001:2022</h1>
        <div class="subtitulo">
            Seleccione los controles que aplican a su organización
        </div>

        <div id="loading" class="loading">Cargando controles...</div>
        <div id="error" class="error-message" style="display: none;"></div>
        
        <div id="stats" class="stats" style="display: none;">
            <span>📊 Total controles: <span id="totalControles">0</span></span>
            <span>✅ Seleccionados: <span id="seleccionados">0</span></span>
        </div>

        <div id="acordeonContainer" class="acordeon-container" style="display: none;"></div>

        <div class="acciones-container">
            <button id="guardarBtn" class="btn">Guardar Selección 💾</button>
        </div>
        <div id="saveStatus" class="save-status"></div>
    </div>

    <script>
        // CONFIGURACIÓN 
        const API_CONTROLES = 'https://lycd7kx0r2.execute-api.us-east-1.amazonaws.com/v1/controles';
        const API_EMPRESA_CONTROLES = 'https://jsaxgpptq9.execute-api.us-east-1.amazonaws.com/v1/empresa-controles';
        const EMPRESA_ID = localStorage.getItem('empresa_id') || 8;
        // Verificar rol para gestión de controles
        const userRole = getUserRole();
        if (userRole !== 'AdminEmpresa' && userRole !== 'Superadmin') {
            document.body.innerHTML = `
                <div style="text-align:center; padding:50px;">
                    <h2>⚠️ Acceso Denegado</h2>
                    <p>No tienes permisos para gestionar controles.</p>
                    <a href="dashboard.html" class="btn btn-primary">Volver al Dashboard</a>
                </div>
            `;
            throw new Error('Acceso denegado');
        }
        // Estado
        let todosControles = [];
        let controlesSeleccionados = new Set();
        let cambiosPendientes = false;

        // Elementos DOM
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const statsDiv = document.getElementById('stats');
        const acordeonContainer = document.getElementById('acordeonContainer');
        const guardarBtn = document.getElementById('guardarBtn');
        const saveStatusDiv = document.getElementById('saveStatus');
        const totalControlesSpan = document.getElementById('totalControles');
        const seleccionadosSpan = document.getElementById('seleccionados');

        // Categorías con sus iconos
        const categorias = {
            'Organizacional': { icono: '🏢', nombre: 'ORGANIZACIONALES' },
            'Personas': { icono: '👥', nombre: 'PERSONAS' },
            'Físicos': { icono: '🔒', nombre: 'FÍSICOS' },
            'Tecnológicos': { icono: '💻', nombre: 'TECNOLÓGICOS' }
        };

        // Función para cargar controles
        async function cargarControles() {
            try {
                loadingDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                
                // 1. Cargar todos los controles
                const responseControles = await fetch(API_CONTROLES);
                if (!responseControles.ok) throw new Error('Error al cargar controles');
                const dataControles = await responseControles.json();
                todosControles = dataControles.controles || [];
                totalControlesSpan.textContent = todosControles.length;
                
                // 2. Cargar controles seleccionados para esta empresa
                const responseSeleccionados = await fetch(`${API_EMPRESA_CONTROLES}?empresa_id=${EMPRESA_ID}`);
                if (!responseSeleccionados.ok) throw new Error('Error al cargar selección');
                const dataSeleccionados = await responseSeleccionados.json();
                controlesSeleccionados = new Set(dataSeleccionados.controles || []);
                actualizarContadorSeleccionados();
                
                // 3. Renderizar acordeones
                renderizarAcordeones();
                
                loadingDiv.style.display = 'none';
                statsDiv.style.display = 'flex';
                acordeonContainer.style.display = 'flex';
                
            } catch (err) {
                console.error('Error:', err);
                errorDiv.textContent = `Error: ${err.message}`;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        }

        function actualizarContadorSeleccionados() {
            seleccionadosSpan.textContent = controlesSeleccionados.size;
        }

        function renderizarAcordeones() {
            acordeonContainer.innerHTML = '';
            
            // Agrupar controles por categoría
            const grupos = {};
            todosControles.forEach(control => {
                const cat = control.categoria || 'Otros';
                if (!grupos[cat]) grupos[cat] = [];
                grupos[cat].push(control);
            });
            
            // Renderizar cada categoría
            for (const [categoria, controles] of Object.entries(grupos)) {
                const catInfo = categorias[categoria] || { icono: '📁', nombre: categoria };
                const seleccionadosEnCategoria = controles.filter(c => controlesSeleccionados.has(c.id)).length;
                
                const details = document.createElement('details');
                details.className = 'categoria-acordeon';
                
                details.innerHTML = `
                    <summary>
                        <div class="summary-content">
                            <div class="summary-left">
                                <span class="categoria-icono">${catInfo.icono}</span>
                                <span class="categoria-nombre">${catInfo.nombre}</span>
                                <div class="categoria-stats">
                                    <span>${seleccionadosEnCategoria}/${controles.length} seleccionados</span>
                                </div>
                            </div>
                            <span class="summary-arrow">▼</span>
                        </div>
                    </summary>
                    <div class="controles-lista" id="lista-${categoria.replace(/\s/g, '-')}"></div>
                `;
                
                acordeonContainer.appendChild(details);
                
                const listaDiv = details.querySelector(`#lista-${categoria.replace(/\s/g, '-')}`);
                
                controles.forEach(control => {
                    const isChecked = controlesSeleccionados.has(control.id);
                    const controlDiv = document.createElement('div');
                    controlDiv.className = 'control-item';
                    controlDiv.innerHTML = `
                        <input type="checkbox" class="control-checkbox" data-id="${control.id}" ${isChecked ? 'checked' : ''}>
                        <div class="control-contenido">
                            <div class="control-header">
                                <span class="control-codigo">${control.id}</span>
                                <span class="control-nombre">${control.titulo}</span>
                            </div>
                            <div class="control-descripcion">${control.descripcion || 'Control de la norma ISO 27001:2022'}</div>
                        </div>
                    `;
                    
                    const checkbox = controlDiv.querySelector('.control-checkbox');
                    checkbox.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            controlesSeleccionados.add(control.id);
                        } else {
                            controlesSeleccionados.delete(control.id);
                        }
                        actualizarContadorSeleccionados();
                        cambiosPendientes = true;
                        // Actualizar contador de la categoría
                        const nuevosSeleccionados = controles.filter(c => controlesSeleccionados.has(c.id)).length;
                        const statsSpan = details.querySelector('.categoria-stats span');
                        if (statsSpan) statsSpan.textContent = `${nuevosSeleccionados}/${controles.length} seleccionados`;
                    });
                    
                    listaDiv.appendChild(controlDiv);
                });
            }
        }

        async function guardarCambios() {
            if (!cambiosPendientes) {
                saveStatusDiv.textContent = 'No hay cambios pendientes';
                setTimeout(() => { saveStatusDiv.textContent = ''; }, 2000);
                return;
            }
            
            guardarBtn.disabled = true;
            saveStatusDiv.textContent = 'Guardando cambios...';
            
            try {
                const response = await fetch(API_EMPRESA_CONTROLES, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        empresa_id: EMPRESA_ID,
                        controles_seleccionados: Array.from(controlesSeleccionados)
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Error al guardar');
                }
                
                const result = await response.json();
                saveStatusDiv.textContent = `✅ ${result.total_controles} controles guardados exitosamente`;
                cambiosPendientes = false;
                
                setTimeout(() => { saveStatusDiv.textContent = ''; }, 3000);
                
            } catch (error) {
                console.error('Error:', error);
                saveStatusDiv.textContent = '❌ Error al guardar cambios';
                setTimeout(() => { saveStatusDiv.textContent = ''; }, 3000);
            } finally {
                guardarBtn.disabled = false;
            }
        }

        guardarBtn.addEventListener('click', guardarCambios);
        
        // Iniciar
        cargarControles();
    </script>
</body>
</html>
