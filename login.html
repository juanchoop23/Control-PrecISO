<!DOCTYPE html>
<html>
<head>
    <title>Login - Control PrecISO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-message {
            color: #dc2626;
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        .loading {
            display: none;
            margin-left: 10px;
        }
        .btn-loading {
            opacity: 0.7;
            cursor: wait;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <h1>Control PrecISO</h1>
        <p>PrecISO y Sin ImprovISO</p>
        <br>

        <div id="errorMessage" class="error-message"></div>

        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="username" placeholder="correo@ejemplo.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Contraseña">
        </div>

        <button id="loginBtn" class="btn" style="background: #485755;">
            <span>Iniciar Sesión</span>
            <span id="loadingSpinner" class="loading">⏳</span>
        </button>

        <div style="margin-top: 15px; text-align: center;">
            <a href="registro.html" style="color: #485755;">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>

    <div class="right">
        <img src="img/logo.png" width="500">
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    // Esperar a que el DOM cargue
    document.addEventListener('DOMContentLoaded', function() {
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessageDiv = document.getElementById('errorMessage');
        const loadingSpinner = document.getElementById('loadingSpinner');

        // Si ya está autenticado, redirigir al dashboard
        if (isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }

        // Función para mostrar error
        function showError(message) {
            errorMessageDiv.textContent = message;
            errorMessageDiv.style.display = 'block';
            setTimeout(() => {
                errorMessageDiv.style.display = 'none';
            }, 5000);
        }

        // Función para ocultar error
        function hideError() {
            errorMessageDiv.style.display = 'none';
        }

        // Función para iniciar sesión
        async function handleLogin() {
            const email = usernameInput.value.trim();
            const password = passwordInput.value;

            // Validar campos
            if (!email || !password) {
                showError('Por favor ingresa usuario y contraseña');
                return;
            }

            // Validar formato de email
            if (!email.includes('@')) {
                showError('Ingresa un correo electrónico válido');
                return;
            }

            // Mostrar loading
            loginBtn.disabled = true;
            loginBtn.classList.add('btn-loading');
            loadingSpinner.style.display = 'inline-block';

            try {
                const result = await login(email, password);
                
                if (result.success) {
                    // Login exitoso, redirigir al dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    showError(result.error || 'Error al iniciar sesión');
                }
            } catch (error) {
                showError('Error de conexión. Intenta nuevamente.');
                console.error(error);
            } finally {
                // Ocultar loading
                loginBtn.disabled = false;
                loginBtn.classList.remove('btn-loading');
                loadingSpinner.style.display = 'none';
            }
        }

        // Conectar el botón al evento click
        loginBtn.addEventListener('click', handleLogin);

        // Permitir login con Enter
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
        usernameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    });
</script>

</body>

<footer class="footer">
    <div class="footer-container">
        <div class="footer-logo">
            <img src="img/logo.png" alt="ISO Logo">
        </div>
        <div class="footer-info">
            <h5>Control PrecISO</h5>
            <p> Despliegue de la Norma ISO 27001:2022</p>
            <p class="copyright"> © 2026 - Todos los derechos reservados.</p>
            <hr>
            <div class="footer-contact">
                <h5>Contacto</h5>
                <p>jdprietop@academia.usbbog.edu.co</p>
                <p>jfordonezc@academia.usbbog.edu.co</p>
            </div>
        </div>
    </div>
</footer>
</html>
