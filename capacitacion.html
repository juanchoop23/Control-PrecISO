<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <title>Capacitación ISO 27001 - Control PrecISO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 600;
            border-left: 5px solid #485755;
            padding-left: 20px;
        }

        .subtitulo {
            color: #64748b;
            margin-bottom: 30px;
            padding-left: 25px;
            font-size: 15px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #485755;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
        }

        .filtros {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .filtro-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filtro-group label {
            font-weight: 600;
            color: #475569;
        }

        .filtro-select {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stats span {
            font-weight: 600;
            color: #485755;
        }

        .controles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .control-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #485755;
        }

        .control-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .control-icon {
            width: 40px;
            height: 40px;
            background: #485755;
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-weight: bold;
            font-size: 14px;
        }

        .control-title {
            font-size: 18px;
            font-weight: 600;
            color: #485755;
        }

        .control-desc {
            color: #475569;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 15px;
            padding: 0 5px;
            flex-grow: 1;
        }

        .badge-categoria {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
            align-self: flex-start;
        }

        .badge-organizacional { background: #e0f2fe; color: #0369a1; }
        .badge-personas { background: #fef9c3; color: #854d0e; }
        .badge-fisicos { background: #dcfce7; color: #166534; }
        .badge-tecnologicos { background: #f3e8ff; color: #6b21a5; }

        .video-container {
            margin-top: 50px;
            margin-bottom: 30px;
            text-align: center;
            width: 100%;
        }

        .video-container h2 {
            color: #1e293b;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }

        .video-container h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 3px;
            background: #485755;
            border-radius: 2px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            aspect-ratio: 16/9;
            background: #000;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
        }

        .video-caption {
            margin-top: 15px;
            color: #64748b;
            font-size: 14px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .controles-grid {
                grid-template-columns: 1fr;
            }
            .filtros {
                flex-direction: column;
            }
            .video-wrapper {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Capacitación ISO 27001:2022</h1>
        <div class="subtitulo">
            Conozca los controles seleccionados para su organización
        </div>

        <div id="loading" class="loading">Cargando controles...</div>
        <div id="error" class="error-message" style="display: none;"></div>
        
        <div id="filtros" style="display: none;">
            <div class="filtros">
                <div class="filtro-group">
                    <label>Filtrar por categoría:</label>
                    <select id="categoriaFilter" class="filtro-select">
                        <option value="todas">Todas las categorías</option>
                        <option value="Organizacional">Organizacionales</option>
                        <option value="Personas">Personas</option>
                        <option value="Físicos">Físicos</option>
                        <option value="Tecnológicos">Tecnológicos</option>
                    </select>
                </div>
                <div class="filtro-group">
                    <label>Buscar:</label>
                    <input type="text" id="searchInput" class="filtro-select" placeholder="Código o título..." style="width: 200px;">
                </div>
            </div>
            <div class="stats">
                <span>📊 Total controles: <span id="totalControles">0</span></span>
                <span>📌 Mostrando: <span id="mostrandoControles">0</span></span>
            </div>
        </div>
        
        <div id="controlesContainer" style="display: none;"></div>

        <!-- SECCIÓN DE VIDEO CENTRADO -->
        <div class="video-container">
            <h2>VIDEO EXPLICATIVO #2</h2>
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/5N3Egx_BEfs" 
                    title="Video tutorial ISO 27001"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="video-caption">
                Tutorial: Auditoría de controles ISO 27001:2022
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const API_EMPRESA_CONTROLES = 'https://jsaxgpptq9.execute-api.us-east-1.amazonaws.com/v1/empresa-controles';
        const API_CONTROLES = 'https://lycd7kx0r2.execute-api.us-east-1.amazonaws.com/v1/controles';
        const EMPRESA_ID = localStorage.getItem('empresa_id') || 8;
        // Verificar rol para capacitación (todos pueden ver)
        const userRole = getUserRole();
        // Sin restricción


        // Estado
        let todosControles = [];
        let controlesFiltrados = [];

        // Elementos DOM
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const filtrosDiv = document.getElementById('filtros');
        const containerDiv = document.getElementById('controlesContainer');
        const categoriaFilter = document.getElementById('categoriaFilter');
        const searchInput = document.getElementById('searchInput');
        const totalControlesSpan = document.getElementById('totalControles');
        const mostrandoControlesSpan = document.getElementById('mostrandoControles');

        // Función para obtener badge de categoría
        function getBadgeClass(categoria) {
            switch(categoria) {
                case 'Organizacional': return 'badge-organizacional';
                case 'Personas': return 'badge-personas';
                case 'Físicos': return 'badge-fisicos';
                case 'Tecnológicos': return 'badge-tecnologicos';
                default: return '';
            }
        }

        // Renderizar controles
        function renderizarControles() {
            containerDiv.innerHTML = '';
            
            if (controlesFiltrados.length === 0) {
                containerDiv.innerHTML = '<div style="text-align: center; padding: 50px; color: #64748b;">No se encontraron controles seleccionados para esta empresa</div>';
                mostrandoControlesSpan.textContent = '0';
                return;
            }
            
            const grid = document.createElement('div');
            grid.className = 'controles-grid';
            
            controlesFiltrados.forEach(control => {
                const numero = control.id.split('.')[1] + '.' + control.id.split('.')[2];
                
                const card = document.createElement('div');
                card.className = 'control-card';
                card.innerHTML = `
                    <div class="control-header">
                        <div class="control-icon">${numero}</div>
                        <div class="control-title">CONTROL ${control.id}</div>
                    </div>
                    <div class="control-desc">
                        <strong>${control.titulo}</strong><br>
                        <span style="color: #64748b; font-size: 12px;">${control.descripcion || 'Control de la norma ISO 27001:2022'}</span>
                    </div>
                    <span class="badge-categoria ${getBadgeClass(control.categoria)}">${control.categoria}</span>
                `;
                grid.appendChild(card);
            });
            
            containerDiv.appendChild(grid);
            mostrandoControlesSpan.textContent = controlesFiltrados.length;
        }

        // Filtrar controles
        function filtrarControles() {
            const categoria = categoriaFilter.value;
            const busqueda = searchInput.value.toLowerCase();
            
            controlesFiltrados = todosControles.filter(control => {
                if (categoria !== 'todas' && control.categoria !== categoria) return false;
                if (busqueda) {
                    const codigoMatch = control.id.toLowerCase().includes(busqueda);
                    const tituloMatch = control.titulo.toLowerCase().includes(busqueda);
                    if (!codigoMatch && !tituloMatch) return false;
                }
                return true;
            });
            
            renderizarControles();
        }

        // Cargar datos
        async function cargarDatos() {
            try {
                loadingDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                filtrosDiv.style.display = 'none';
                containerDiv.style.display = 'none';

                // 1. Obtener controles seleccionados para la empresa
                const responseSeleccionados = await fetch(`${API_EMPRESA_CONTROLES}?empresa_id=${EMPRESA_ID}`);
                if (!responseSeleccionados.ok) throw new Error('Error al cargar controles seleccionados');
                const dataSeleccionados = await responseSeleccionados.json();
                const controlIds = dataSeleccionados.controles || [];
                
                if (controlIds.length === 0) {
                    throw new Error('No hay controles seleccionados para esta empresa');
                }
                
                // 2. Obtener detalles de todos los controles
                const responseDetalles = await fetch(API_CONTROLES);
                if (!responseDetalles.ok) throw new Error('Error al cargar detalles de controles');
                const dataDetalles = await responseDetalles.json();
                const todosControlesCompletos = dataDetalles.controles || [];
                
                // 3. Filtrar solo los controles seleccionados
                todosControles = todosControlesCompletos.filter(c => controlIds.includes(c.id));
                totalControlesSpan.textContent = todosControles.length;
                
                // 4. Configurar filtros
                controlesFiltrados = [...todosControles];
                
                categoriaFilter.addEventListener('change', filtrarControles);
                searchInput.addEventListener('input', filtrarControles);
                
                renderizarControles();
                
                filtrosDiv.style.display = 'block';
                containerDiv.style.display = 'block';
                loadingDiv.style.display = 'none';

            } catch (err) {
                console.error('Error:', err);
                errorDiv.textContent = `Error: ${err.message}`;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        }

        // Iniciar
        cargarDatos();
    </script>
</body>
</html>
