<!DOCTYPE html>
<html>
<head>
    <title>Matriz de Riesgos - Control PrecISO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #f5f7fb;
        }
        .page-header {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #6c757d;
        }
        .stat-card.bajo .stat-number { color: #0f5132; }
        .stat-card.medio .stat-number { color: #856404; }
        .stat-card.alto .stat-number { color: #dc3545; }
        .stat-card.critico .stat-number { color: #8b1e28; }
        
        .card-custom {
            background: white;
            border-radius: 16px;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 1.5rem;
        }
        .card-custom .card-header {
            background: white;
            border-bottom: 2px solid #e9ecef;
            padding: 1rem 1.5rem;
            font-weight: 600;
            color: #485755;
            border-radius: 16px 16px 0 0;
        }
        .card-custom .card-body {
            padding: 1.5rem;
        }
        
        .matriz-table {
            width: 100%;
            text-align: center;
            border-collapse: collapse;
        }
        .matriz-table th, .matriz-table td {
            padding: 12px;
            border: 1px solid #e9ecef;
        }
        .matriz-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #485755;
        }
        .celda-1 { background: #d1e7dd; }
        .celda-2 { background: #a3cfbb; }
        .celda-3 { background: #fff3cd; }
        .celda-4 { background: #ffe0b2; }
        .celda-5 { background: #f8d7da; }
        .celda-6 { background: #f5c6cb; }
        .celda-9 { background: #f1b0b7; }
        .celda-12 { background: #e4606d; }
        .celda-16 { background: #dc3545; color: white; }
        .celda-20 { background: #b02a37; color: white; }
        .celda-25 { background: #8b1e28; color: white; }
        
        .riesgo-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-left: 4px solid;
        }
        .riesgo-item.Bajo { border-left-color: #0f5132; }
        .riesgo-item.Medio { border-left-color: #856404; }
        .riesgo-item.Alto { border-left-color: #dc3545; }
        .riesgo-item.Critico { border-left-color: #8b1e28; }
        
        .nivel-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .nivel-Bajo { background: #d1e7dd; color: #0f5132; }
        .nivel-Medio { background: #fff3cd; color: #856404; }
        .nivel-Alto { background: #f8d7da; color: #721c24; }
        .nivel-Critico { background: #dc3545; color: white; }
        
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #6c757d;
        }
        .loading {
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid px-4 py-3">
        <!-- Header -->
        <div class="page-header">
            <h2 class="mb-1">🔥 Matriz de Riesgos</h2>
            <p class="text-muted mb-0">Visualización de riesgos evaluados por nivel de probabilidad e impacto</p>
        </div>

        <div id="loadingSpinner" class="loading">
            <div class="spinner-border text-secondary" role="status"></div>
            <p class="mt-2">Cargando matriz de riesgos...</p>
        </div>
        
        <div id="contenidoPrincipal" style="display: none;">
            <!-- Stats -->
            <div class="stats-grid" id="resumenContainer"></div>
            
            <!-- Matriz de Calor -->
            <div class="card-custom">
                <div class="card-header">📊 Matriz de Calor (Probabilidad vs Impacto)</div>
                <div class="card-body" id="matrizContainer"></div>
            </div>
            
            <!-- Lista de Riesgos -->
            <div class="card-custom">
                <div class="card-header">📋 Riesgos Evaluados</div>
                <div class="card-body" id="riesgosContainer"></div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const API_URL = 'https://7fj91g35sl.execute-api.us-east-1.amazonaws.com/v1';
        let empresaId = null;

        async function obtenerEmpresaId() {
            try {
                const id = await getEmpresaId();
                empresaId = id || parseInt(localStorage.getItem('empresa_id') || '8');
                return empresaId;
            } catch (error) {
                empresaId = 8;
                return 8;
            }
        }

        async function cargarMatriz() {
            if (!empresaId) await obtenerEmpresaId();
            
            const loading = document.getElementById('loadingSpinner');
            const contenido = document.getElementById('contenidoPrincipal');
            
            try {
                const response = await fetch(`${API_URL}/riesgos/matriz?empresa_id=${empresaId}`);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || 'Error al cargar datos');
                }
                
                const riesgos = result.data;
                const resumen = result.resumen;
                
                // Mostrar resumen
                document.getElementById('resumenContainer').innerHTML = `
                    <div class="stat-card bajo">
                        <div class="stat-number">${resumen.Bajo || 0}</div>
                        <div class="stat-label">Riesgos Bajos</div>
                    </div>
                    <div class="stat-card medio">
                        <div class="stat-number">${resumen.Medio || 0}</div>
                        <div class="stat-label">Riesgos Medios</div>
                    </div>
                    <div class="stat-card alto">
                        <div class="stat-number">${resumen.Alto || 0}</div>
                        <div class="stat-label">Riesgos Altos</div>
                    </div>
                    <div class="stat-card critico">
                        <div class="stat-number">${resumen.Critico || 0}</div>
                        <div class="stat-label">Riesgos Críticos</div>
                    </div>
                `;
                
                // Mostrar matriz
                document.getElementById('matrizContainer').innerHTML = generarMatrizCalor(riesgos);
                
                // Mostrar lista de riesgos
                const riesgosContainer = document.getElementById('riesgosContainer');
                if (riesgos.length === 0) {
                    riesgosContainer.innerHTML = '<div class="empty-state">📭 No hay riesgos evaluados aún. Ve a "Gestión de Riesgos" para crear evaluaciones.</div>';
                } else {
                    riesgosContainer.innerHTML = riesgos.map(r => `
                        <div class="riesgo-item ${r.nivel_riesgo_inherente}">
                            <div class="d-flex justify-content-between align-items-start flex-wrap">
                                <div>
                                    <strong>${escapeHtml(r.activo_nombre)}</strong>
                                    <span class="badge bg-secondary ms-1">${r.activo_codigo}</span>
                                    <div class="small text-muted mt-1">
                                        Amenaza: ${escapeHtml(r.amenaza_nombre)} (${r.amenaza_codigo})<br>
                                        Vulnerabilidad: ${escapeHtml(r.vulnerabilidad_nombre)} (${r.vulnerabilidad_codigo})
                                    </div>
                                </div>
                                <div class="text-end">
                                    <span class="nivel-badge nivel-${r.nivel_riesgo_inherente}">${r.nivel_riesgo_inherente}</span>
                                    <div class="small text-muted mt-1">${r.probabilidad} × ${r.impacto}</div>
                                </div>
                            </div>
                            <div class="small text-muted mt-2">
                                📅 ${new Date(r.fecha_evaluacion).toLocaleDateString()} | 📌 ${r.estado}
                            </div>
                        </div>
                    `).join('');
                }
                
                loading.style.display = 'none';
                contenido.style.display = 'block';
                
            } catch (error) {
                console.error('Error:', error);
                loading.innerHTML = `<div class="alert alert-danger">Error al cargar matriz: ${error.message}</div>`;
            }
        }
        
        function generarMatrizCalor(riesgos) {
            const valoresProb = {'Muy Baja': 1, 'Baja': 2, 'Media': 3, 'Alta': 4, 'Muy Alta': 5};
            const valoresImp = {'Muy Bajo': 1, 'Bajo': 2, 'Medio': 3, 'Alto': 4, 'Muy Alto': 5};
            
            const matriz = {};
            riesgos.forEach(r => {
                const p = valoresProb[r.probabilidad];
                const i = valoresImp[r.impacto];
                const key = `${p},${i}`;
                matriz[key] = (matriz[key] || 0) + 1;
            });
            
            const nivelesProb = ['Muy Baja', 'Baja', 'Media', 'Alta', 'Muy Alta'];
            const nivelesImp = ['Muy Alto', 'Alto', 'Medio', 'Bajo', 'Muy Bajo'];
            
            let html = '<div style="overflow-x: auto;"><table class="matriz-table">';
            html += '<tr><th></th><th>Muy Baja</th><th>Baja</th><th>Media</th><th>Alta</th><th>Muy Alta</th></tr>';
            
            nivelesImp.forEach(impacto => {
                html += '<tr>';
                html += `<th style="background:#e9ecef;">${impacto}</th>`;
                const impVal = valoresImp[impacto];
                
                nivelesProb.forEach(probabilidad => {
                    const probVal = valoresProb[probabilidad];
                    const riesgoValor = probVal * impVal;
                    let claseCelda = 'celda-1';
                    if (riesgoValor <= 5) claseCelda = 'celda-1';
                    else if (riesgoValor <= 12) claseCelda = 'celda-3';
                    else if (riesgoValor <= 19) claseCelda = 'celda-5';
                    else if (riesgoValor <= 25) claseCelda = 'celda-9';
                    
                    const count = matriz[`${probVal},${impVal}`] || 0;
                    html += `<td class="${claseCelda}">${count > 0 ? count : '-'}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</table></div>';
            html += '<p class="text-muted small mt-3">📌 Los números indican la cantidad de riesgos evaluados en cada combinación de Probabilidad × Impacto.</p>';
            return html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('DOMContentLoaded', cargarMatriz);
    </script>
</body>
</html>
