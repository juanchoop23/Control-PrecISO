<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Controles de Proveedores - Superadmin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #ffffff;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            border-left: 5px solid #485755;
            padding-left: 20px;
        }
        .subtitulo {
            color: #64748b;
            margin-bottom: 30px;
            padding-left: 25px;
        }
        .control-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        .control-id {
            font-size: 18px;
            font-weight: 700;
            color: #485755;
        }
        .control-titulo {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }
        .control-descripcion {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            resize: vertical;
            font-size: 14px;
        }
        .btn {
            padding: 8px 16px;
            background: #485755;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #1a2560;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #485755;
        }
        .save-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #485755;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestión de Controles de Proveedores</h1>
        <div class="subtitulo">
            Controles ISO 27001:2022 específicos para proveedores (A.5.19 - A.5.22)
        </div>
        <div id="loading" class="loading">Cargando controles...</div>
        <div id="controlesContainer"></div>
    </div>

    <script>
        const API_CONTROLES = 'https://lycd7kx0r2.execute-api.us-east-1.amazonaws.com/v1/controles';
        
        // IDs de los controles de proveedores
        const CONTROLES_PROVEEDORES = ['A.5.19', 'A.5.20', 'A.5.21', 'A.5.22'];
        
        let controles = [];

        async function cargarControles() {
            try {
                const response = await fetch(API_CONTROLES);
                const data = await response.json();
                const todosControles = data.controles || [];
                
                // Filtrar solo los controles de proveedores
                controles = todosControles.filter(c => CONTROLES_PROVEEDORES.includes(c.id));
                
                const container = document.getElementById('controlesContainer');
                container.innerHTML = '';
                document.getElementById('loading').style.display = 'none';
                
                controles.forEach(control => {
                    const card = document.createElement('div');
                    card.className = 'control-card';
                    card.innerHTML = `
                        <div class="control-header">
                            <span class="control-id">${control.id}</span>
                            <button class="btn" onclick="guardarControl('${control.id}')">💾 Guardar</button>
                        </div>
                        <input type="text" id="titulo-${control.id}" class="control-titulo" value="${escapeHtml(control.titulo || '')}">
                        <textarea id="desc-${control.id}" class="control-descripcion" rows="4">${escapeHtml(control.descripcion || '')}</textarea>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').innerHTML = `<div style="color:#dc2626;">Error: ${error.message}</div>`;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function guardarControl(controlId) {
            const titulo = document.getElementById(`titulo-${controlId}`).value;
            const descripcion = document.getElementById(`desc-${controlId}`).value;
            
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '💾 Guardando...';
            btn.disabled = true;
            
            // Mostrar toast de guardando
            showStatus('Guardando cambios...');
            
            try {
                // Aquí iría la llamada a la API para actualizar el control
                // Por ahora simulamos éxito
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                showStatus(`✅ Control ${controlId} guardado exitosamente`);
                btn.textContent = '✅ Guardado!';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                showStatus(`❌ Error al guardar ${controlId}`, true);
                btn.textContent = '❌ Error';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);
            }
        }
        
        function showStatus(message, isError = false) {
            let statusDiv = document.getElementById('statusToast');
            if (!statusDiv) {
                statusDiv = document.createElement('div');
                statusDiv.id = 'statusToast';
                statusDiv.className = 'save-status';
                document.body.appendChild(statusDiv);
            }
            statusDiv.style.background = isError ? '#dc2626' : '#485755';
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
        
        cargarControles();
    </script>
</body>
</html>
