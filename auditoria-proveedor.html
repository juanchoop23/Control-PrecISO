<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <title>Auditoría de Proveedores - ISO 27001</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 600;
            border-left: 5px solid #485755;
            padding-left: 20px;
        }

        .subtitulo {
            color: #64748b;
            margin-bottom: 30px;
            padding-left: 25px;
            font-size: 15px;
        }

        .proveedor-info {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #e2e8f0;
        }

        .proveedor-info h3 {
            color: #1e293b;
            margin-bottom: 10px;
        }

        .proveedor-info p {
            color: #475569;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #485755;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
        }

        .controles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .control-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #485755;
        }

        .control-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .control-icon {
            width: 40px;
            height: 40px;
            background: #485755;
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-weight: bold;
            font-size: 14px;
        }

        .control-title {
            font-size: 18px;
            font-weight: 600;
            color: #485755;
        }

        .control-desc {
            color: #475569;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 15px;
            padding: 0 5px;
            flex-grow: 1;
        }

        .estados-container {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            background: white;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .estado-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f1f5f9;
        }

        .estado-item.selected {
            background: #485755;
        }

        .estado-item.selected .estado-label {
            color: white;
        }

        .estado-label {
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .estado-label.cumple { color: #10b981; }
        .estado-label.nocumple { color: #ef4444; }

        .estado-item.selected .estado-label.cumple,
        .estado-item.selected .estado-label.nocumple {
            color: white;
        }

        .comentario-input {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 12px;
            resize: vertical;
        }

        .acciones-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            gap: 15px;
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #485755;
            color: white;
            box-shadow: 0 4px 10px rgba(72, 87, 85, 0.3);
        }

        .btn-primary:hover {
            background: #1a2560;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: #485755;
            border: 2px solid #485755;
        }

        .btn-secondary:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .save-status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #10b981;
        }

        @media (max-width: 768px) {
            .controles-grid {
                grid-template-columns: 1fr;
            }
            .estados-container {
                flex-direction: column;
            }
            .acciones-container {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Auditoría de Proveedores</h1>
        <div class="subtitulo">
            Evaluación de controles ISO 27001 para proveedores y terceros
        </div>

        <div id="proveedorInfo" class="proveedor-info" style="display: none;">
            <h3 id="proveedorNombre">Proveedor: </h3>
            <p id="proveedorDetalle"></p>
        </div>

        <div id="loading" class="loading">Cargando controles...</div>
        <div id="error" class="error-message" style="display: none;"></div>
        
        <div id="controlesContainer" style="display: none;"></div>

        <div class="acciones-container">
            <a href="gestion-proveedores.html" class="btn btn-secondary">← Volver</a>
            <button id="guardarBtn" class="btn btn-primary">Guardar Evaluación 💾</button>
        </div>
        <div id="saveStatus" class="save-status"></div>
    </div>

    <script>
        // CONFIGURACIÓN
        const API_CONTROLES = 'https://lycd7kx0r2.execute-api.us-east-1.amazonaws.com/v1/controles';
        const API_EVALUACIONES = 'https://bq7xmey8yb.execute-api.us-east-1.amazonaws.com/v1/proveedores-evaluaciones';
        
        // Obtener parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const PROVEEDOR_ID = urlParams.get('proveedor_id');
        const PROVEEDOR_NOMBRE = urlParams.get('nombre') || 'Proveedor';

        // Controles específicos para proveedores
        const CONTROLES_PROVEEDORES = ['A.5.19', 'A.5.20', 'A.5.21', 'A.5.22'];

        // Estado
        let controles = [];
        let evaluacionActual = {};
        let cambiosPendientes = new Map();

        // Verificar rol
        const userRole = getUserRole();
        if (userRole !== 'AdminEmpresa' && userRole !== 'Superadmin') {
            document.body.innerHTML = `
                <div style="text-align:center; padding:50px;">
                    <h2>⚠️ Acceso Denegado</h2>
                    <p>No tienes permisos para auditar proveedores.</p>
                    <a href="gestion-proveedores.html" class="btn btn-primary">Volver</a>
                </div>
            `;
            throw new Error('Acceso denegado');
        }

        // Elementos DOM
        const proveedorInfoDiv = document.getElementById('proveedorInfo');
        const proveedorNombreSpan = document.getElementById('proveedorNombre');
        const proveedorDetalleP = document.getElementById('proveedorDetalle');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const containerDiv = document.getElementById('controlesContainer');
        const guardarBtn = document.getElementById('guardarBtn');
        const saveStatusDiv = document.getElementById('saveStatus');

        // Renderizar controles
        function renderizarControles() {
            containerDiv.innerHTML = '';
            
            if (controles.length === 0) {
                containerDiv.innerHTML = '<div style="text-align: center; padding: 50px; color: #64748b;">No hay controles para proveedores</div>';
                return;
            }
            
            const grid = document.createElement('div');
            grid.className = 'controles-grid';
            
            controles.forEach(control => {
                const controlId = control.id;
                const estadoActual = evaluacionActual[controlId] || 'no_aplica';
                const comentarioActual = cambiosPendientes.get(controlId)?.comentario || '';
                
                const card = document.createElement('div');
                card.className = 'control-card';
                card.dataset.id = controlId;
                
                // Extraer número para el icono
                const numero = controlId.split('.')[1] + '.' + controlId.split('.')[2];
                
                card.innerHTML = `
                    <div class="control-header">
                        <div class="control-icon">${numero}</div>
                        <div class="control-title">CONTROL ${controlId}</div>
                    </div>
                    <div class="control-desc">
                        <strong>${control.titulo}</strong><br>
                        <span style="color: #64748b; font-size: 12px;">${control.descripcion || 'Control de seguridad para proveedores'}</span>
                    </div>
                    <div class="estados-container">
                        <div class="estado-item ${estadoActual === 'cumple' ? 'selected' : ''}" data-estado="cumple">
                            <span class="estado-label cumple">✅ CÚMPLE</span>
                        </div>
                        <div class="estado-item ${estadoActual === 'no_cumple' ? 'selected' : ''}" data-estado="no_cumple">
                            <span class="estado-label nocumple">❌ NO CUMPLE</span>
                        </div>
                    </div>
                    <textarea class="comentario-input" placeholder="Comentarios / Evidencias (opcional)..." rows="2">${comentarioActual}</textarea>
                `;
                
                // Eventos para seleccionar estado
                const estadoItems = card.querySelectorAll('.estado-item');
                estadoItems.forEach(item => {
                    item.addEventListener('click', () => {
                        const nuevoEstado = item.dataset.estado;
                        const comentario = card.querySelector('.comentario-input').value;
                        
                        estadoItems.forEach(el => el.classList.remove('selected'));
                        item.classList.add('selected');
                        
                        cambiosPendientes.set(controlId, {
                            estado: nuevoEstado,
                            comentario: comentario
                        });
                        
                        // Actualizar evaluación actual
                        evaluacionActual[controlId] = nuevoEstado;
                    });
                });
                
                // Evento para cambios en comentario
                const comentarioInput = card.querySelector('.comentario-input');
                comentarioInput.addEventListener('change', () => {
                    const estadoActualSeleccionado = card.querySelector('.estado-item.selected');
                    const estado = estadoActualSeleccionado ? estadoActualSeleccionado.dataset.estado : (evaluacionActual[controlId] || 'no_aplica');
                    cambiosPendientes.set(controlId, {
                        estado: estado,
                        comentario: comentarioInput.value
                    });
                });
                
                grid.appendChild(card);
            });
            
            containerDiv.appendChild(grid);
        }

        // Guardar evaluación
        async function guardarEvaluacion() {
            if (cambiosPendientes.size === 0) {
                saveStatusDiv.textContent = 'No hay cambios pendientes';
                setTimeout(() => { saveStatusDiv.textContent = ''; }, 2000);
                return;
            }

            guardarBtn.disabled = true;
            saveStatusDiv.textContent = 'Guardando evaluación...';
            
            // Preparar resultados
            const resultados = [];
            for (const [controlId, cambio] of cambiosPendientes) {
                resultados.push({
                    control_id: controlId,
                    estado: cambio.estado,
                    comentarios: cambio.comentario || ''
                });
            }
            
            try {
                const response = await fetch(API_EVALUACIONES, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        proveedor_id: parseInt(PROVEEDOR_ID),
                        fecha_evaluacion: new Date().toISOString().split('T')[0],
                        evaluador: localStorage.getItem('user_email') || 'admin@empresa.com',
                        resultados: resultados
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Error al guardar');
                }
                
                const result = await response.json();
                saveStatusDiv.textContent = `✅ Evaluación guardada exitosamente - Resultado: ${result.resultado_global}% (Riesgo ${result.nivel_riesgo})`;
                cambiosPendientes.clear();
                
                // Actualizar evaluación actual con los valores guardados
                for (const [controlId, cambio] of cambiosPendientes) {
                    evaluacionActual[controlId] = cambio.estado;
                }
                
                setTimeout(() => { saveStatusDiv.textContent = ''; }, 5000);
                
            } catch (error) {
                console.error('Error:', error);
                saveStatusDiv.textContent = `❌ Error: ${error.message}`;
                setTimeout(() => { saveStatusDiv.textContent = ''; }, 3000);
            } finally {
                guardarBtn.disabled = false;
            }
        }

        // Cargar controles para proveedores
        async function cargarControles() {
            try {
                loadingDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                containerDiv.style.display = 'none';
                
                // Mostrar información del proveedor
                proveedorNombreSpan.textContent = `Proveedor: ${PROVEEDOR_NOMBRE}`;
                proveedorDetalleP.textContent = `ID: ${PROVEEDOR_ID} - Evaluación de controles ISO 27001`;
                proveedorInfoDiv.style.display = 'block';
                
                // Cargar todos los controles
                const response = await fetch(API_CONTROLES);
                if (!response.ok) throw new Error('Error al cargar controles');
                const data = await response.json();
                const todosControles = data.controles || [];
                
                // Filtrar solo controles para proveedores
                controles = todosControles.filter(c => CONTROLES_PROVEEDORES.includes(c.id));
                
                if (controles.length === 0) {
                    throw new Error('No se encontraron controles para proveedores');
                }
                
                // Inicializar evaluación actual
                controles.forEach(c => {
                    evaluacionActual[c.id] = 'no_aplica';
                });
                
                renderizarControles();
                
                loadingDiv.style.display = 'none';
                containerDiv.style.display = 'block';
                
            } catch (err) {
                console.error('Error:', err);
                errorDiv.textContent = `Error: ${err.message}`;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        }

        // Verificar que tenemos proveedor_id
        if (!PROVEEDOR_ID) {
            errorDiv.textContent = 'No se especificó un proveedor';
            errorDiv.style.display = 'block';
            loadingDiv.style.display = 'none';
        } else {
            guardarBtn.addEventListener('click', guardarEvaluacion);
            cargarControles();
        }
    </script>
</body>
</html>
